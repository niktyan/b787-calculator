version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    ignore:
      # Expo SDK-coordinated packages — MAJOR bumps require a
      # coordinated SDK upgrade (expo + react-native + all expo-*
      # peers + native config), not point-bumps via Dependabot.
      # PATCH and MINOR within the current SDK remain auto-proposed.
      # See ADR-0008 and 02_Specification/09-cicd-and-ops.md.
      - dependency-name: 'expo'
        update-types: ['version-update:semver-major']
      - dependency-name: 'expo-*'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-native'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-native-*'
        update-types: ['version-update:semver-major']
      - dependency-name: '@react-native/*'
        update-types: ['version-update:semver-major']

      # Gap 1 · 0.X versioning — `react-native` and
      # `react-native-worklets` use 0.X.Y semantics where each 0.X
      # bump is effectively a major release (new RN architecture
      # baseline / new worklets ABI). Dependabot classifies them as
      # semver-minor by npm leading-zero rule, so the major-only
      # rules above don't fire. Block minor too. PATCH within a 0.X
      # (e.g. 0.81.5 → 0.81.6) remains auto-proposed — those are
      # typically safe. Discovered via PR #34 (RN 0.81 → 0.85).
      # See ADR-0008 § "Enforcement gaps and refinements".
      - dependency-name: 'react-native'
        update-types: ['version-update:semver-minor']
      - dependency-name: 'react-native-worklets'
        update-types: ['version-update:semver-minor']

      # Gap 2 · Prefix matching — `expo-*` glob doesn't match
      # `eslint-config-expo` or `jest-expo` (they don't start with
      # "expo-"), but their major versions track Expo SDK release
      # cycle. Explicit entries needed. Discovered via PR #36
      # (eslint-config-expo 10.0.0 → 55.0.0).
      - dependency-name: 'eslint-config-expo'
        update-types: ['version-update:semver-major']
      - dependency-name: 'jest-expo'
        update-types: ['version-update:semver-major']
    groups:
      production-dependencies:
        dependency-type: 'production'
        update-types:
          - 'patch'
          - 'minor'
      dev-dependencies:
        dependency-type: 'development'
        update-types:
          - 'patch'
          - 'minor'
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
